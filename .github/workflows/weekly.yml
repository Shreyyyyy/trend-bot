name: Weekly Trend Bot (Mon 09:30 IST)

on:
  workflow_dispatch: {}
  schedule:
    # Daily at 09:30 Asia/Kolkata = 04:00 UTC
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend bot
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m trend_bot.run --out out
          python -m trend_bot.notify_telegram --ideas out/ideas.md
          # Copy to web public folder for the UI
          mkdir -p web/public/data
          cp out/trends.json web/public/data/trends.json
          cp out/ideas.md web/public/data/ideas.md

      - name: Commit and push UI data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add web/public/data/
          git commit -m "Weekly trend update [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trend-bot-out
          path: out/
